<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Portal — Black Pearl Agency</title>
<meta name="description" content="Sign in to your Black Pearl client dashboard.">
<link rel="canonical" href="https://www.blackpearl.agency/client-portal.html">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="portal-shell">
  <div class="portal-side">
    <a href="index.html" class="logo" style="margin-bottom:60px;color:#fff;"><span class="dot"></span>BLACK PEARL</a>
    <h2 class="serif" style="font-size:34px;max-width:380px;margin-bottom:18px;" data-en="Your reporting, budgets and campaigns — in one place." data-ar="تقاريرك وميزانياتك وحملاتك — في مكان واحد.">Your reporting, budgets and campaigns — in one place.</h2>
    <p style="color:rgba(255,255,255,.6);font-size:15px;max-width:360px;line-height:1.7;" data-en="Real-time performance dashboards, monthly reports and direct access to your strategist." data-ar="لوحات أداء لحظية وتقارير شهرية وتواصل مباشر مع مسؤول حسابك.">Real-time performance dashboards, monthly reports and direct access to your strategist.</p>
    <div style="margin-top:40px;display:flex;gap:12px;">
      <a href="https://wa.me/201220300698" class="btn btn-outline-light btn-sm" target="_blank" rel="noopener"><i data-lucide="message-circle" style="width:15px;height:15px;"></i><span data-en="Need help?" data-ar="تحتاج مساعدة؟">Need help?</span></a>
    </div>
  </div>
  <div class="portal-form-wrap">
    <form class="portal-form" data-reveal>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;">
        <a href="index.html" class="logo"><span class="dot"></span>BLACK PEARL</a>
        <div class="util-toggle">
          <button class="icon-btn" id="themeToggle" type="button" aria-label="Toggle dark mode">
            <i data-lucide="sun" class="icon-sun"></i><i data-lucide="moon" class="icon-moon"></i>
          </button>
          <button class="lang-btn" id="langToggle" type="button" aria-label="Toggle Arabic">AR</button>
        </div>
      </div>
      <h1 data-en="Client login" data-ar="تسجيل دخول العملاء">Client login</h1>
      <p class="sub" data-en="Sign in to view your account dashboard." data-ar="سجّل الدخول لعرض لوحة تحكم حسابك.">Sign in to view your account dashboard.</p>
      <div class="field"><label data-en="Email" data-ar="البريد الإلكتروني">Email</label><input type="email" placeholder="name@company.com"></div>
      <div class="field"><label data-en="Password" data-ar="كلمة المرور">Password</label><input type="password" placeholder="••••••••"></div>
      <button class="btn btn-primary" type="button"><span data-en="Sign In" data-ar="تسجيل الدخول">Sign In</span> <i data-lucide="arrow-right" style="width:16px;height:16px;"></i></button>
      <p class="portal-meta"><span data-en="Forgot your password?" data-ar="نسيت كلمة المرور؟">Forgot your password?</span> <a href="contact.html" style="text-decoration:underline;" data-en="Contact your strategist" data-ar="تواصل مع مسؤول حسابك">Contact your strategist</a>.</p>
    </form>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="script.js"></script>
</body>
</html>
